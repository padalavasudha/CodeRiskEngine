<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scanning...</title>
  <style>
    :root{
      --bg:#070b18;
      --panel2:rgba(20, 28, 48, 0.92);
      --line:rgba(148,163,184,.14);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --blue:#49b6ff;
      --blue2:#5ea8ff;
      --shadow:0 28px 90px rgba(0,0,0,.45);
      --radius:28px;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(73,182,255,.10), transparent 24%),
        radial-gradient(circle at 82% 82%, rgba(94,168,255,.08), transparent 22%),
        linear-gradient(180deg, #060914 0%, #070b18 100%);
    }

    .window{
      width:min(980px, 94vw);
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(15,23,42,.95), rgba(11,16,32,.94));
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      backdrop-filter: blur(18px);
    }

    .titlebar{
      height:64px;
      display:flex;
      align-items:center;
      gap:14px;
      padding:0 18px;
      border-bottom:1px solid var(--line);
      background:rgba(15,23,42,.45);
    }

    .lights{ display:flex; gap:8px; }
    .light{ width:12px; height:12px; border-radius:50%; }
    .red{ background:#ff5f57; }
    .yellow{ background:#febc2e; }
    .green{ background:#28c840; }

    .appname{
      font-weight:700;
      color:#dbeafe;
    }

    .content{
      padding:28px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    h1{
      margin:0;
      font-size:34px;
      letter-spacing:-0.05em;
    }

    p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .pipeline-status{
      padding:14px;
      border:1px solid rgba(148,163,184,.14);
      border-radius:18px;
      background:rgba(20,28,48,.78);
    }

    .pipeline-steps{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .step{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.14);
      color:#94a3b8;
      font-size:13px;
      font-weight:700;
    }

    .step.active{
      background:rgba(73,182,255,.18);
      border-color:rgba(73,182,255,.35);
      color:#dbeafe;
    }

    .pipeline-bar{
      width:100%;
      height:10px;
      border-radius:999px;
      background:rgba(148,163,184,.12);
      overflow:hidden;
      margin-bottom:10px;
    }

    .pipeline-fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg, #49b6ff, #22c55e);
      transition:width .25s ease;
    }

    .pipeline-text{
      color:#cbd5e1;
      font-size:13px;
      min-height:18px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .btn{
      height:44px;
      padding:0 16px;
      border-radius:14px;
      border:0;
      font-weight:800;
      font-size:15px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:transform .15s ease;
      cursor:pointer;
    }

    .btn:hover{ transform:translateY(-1px); }

    .btn-primary{
      background:linear-gradient(135deg, var(--blue), var(--blue2));
      color:#07111f;
    }

    .btn-secondary{
      background:rgba(148,163,184,.12);
      color:#e5e7eb;
      border:1px solid rgba(148,163,184,.18);
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <div class="lights">
        <div class="light red"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
      </div>
      <div class="appname">CodeRisk Engine</div>
    </div>

    <div class="content">
      <h1>Scanning in progress</h1>
      <p>Hang tight. The pipeline is running ML scanning, threat assessment, and future risk prediction.</p>

      <div class="pipeline-status">
        <div class="pipeline-steps">
          <div class="step" id="step-ml">ML Scanning</div>
          <div class="step" id="step-threat">Threat Assessment</div>
          <div class="step" id="step-risk">Future Risk</div>
        </div>
        <div class="pipeline-bar">
          <div class="pipeline-fill" id="pipelineFill"></div>
        </div>
        <div class="pipeline-text" id="pipelineText">Preparing scan...</div>
      </div>

      <div class="actions">
        <a class="btn btn-secondary" href="{{ url_for('index') }}">Back to upload</a>
      </div>
    </div>
  </div>

  <script>
    const jobId = "{{ job_id }}";

    function setStep(activeId, text, pct) {
      ["step-ml", "step-threat", "step-risk"].forEach(id => {
        document.getElementById(id).classList.toggle("active", id === activeId);
      });
      document.getElementById("pipelineText").textContent = text;
      document.getElementById("pipelineFill").style.width = pct + "%";
    }

    function stageToUI(stage, progress) {
      const s = (stage || "").toLowerCase();
      if (s.includes("ml")) return ["step-ml", "ML based scanning is running...", progress || 10];
      if (s.includes("threat")) return ["step-threat", "Threat screening is running...", progress || 45];
      if (s.includes("future")) return ["step-risk", "Future risk prediction is running...", progress || 75];
      if (s.includes("final")) return ["step-risk", "Finalizing report...", progress || 95];
      if (s.includes("done")) return ["step-risk", "Scan complete.", 100];
      if (s.includes("error")) return ["step-ml", "Scan failed.", 100];
      if (s.includes("queued")) return ["step-ml", "Queued for scanning...", 3];
      return ["step-ml", "Preparing scan...", progress || 0];
    }

    async function pollStatus() {
      const r = await fetch(`/api/status/${jobId}`);
      const data = await r.json();

      if (data.error) {
        setStep("step-ml", data.error, 100);
        return;
      }

      const [activeId, text, pct] = stageToUI(data.stage, data.progress);
      setStep(activeId, text, pct);

      if (data.done) {
        window.location.href = `/results/${jobId}`;
        return;
      }

      setTimeout(pollStatus, 1000);
    }

    pollStatus();
  </script>
</body>
</html>
